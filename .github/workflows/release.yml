name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da rilasciare (es. v2.2.3)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build distributable
        run: npm run dist:mac

      - name: List release outputs
        run: ls -1 release
        shell: bash

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build distributable
        run: npm run dist:win

      - name: List release outputs
        run: Get-ChildItem release | Select-Object -ExpandProperty Name
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          files=( *.dmg *.zip *.exe *.blockmap latest*.yml )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found for checksums" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Clear existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          if ! release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null)"; then
            echo "No existing release found for ${RELEASE_TAG}"
            exit 0
          fi
          if [ -z "$release_id" ]; then
            echo "No existing release found for ${RELEASE_TAG}"
            exit 0
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --paginate --jq '.[].id' |
            while read -r asset_id; do
              if [ -n "$asset_id" ]; then
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
              fi
            done

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: The Novelist ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
